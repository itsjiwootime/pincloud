spring:
  application:
    name: pincloud
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/pincloud?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${env.DB_PASSWORD:pincloud}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:test-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:test-kakao-client-secret}
            redirect-uri: "${KAKAO_REDIRECT_URI:{baseUrl}/api/auth/kakao/callback}"
            authorization-grant-type: authorization_code
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:test-kakao-rest-api-key}
  place-search-url: https://dapi.kakao.com/v2/local/search/keyword.json

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
  base-url: https://api.openai.com/v1

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevOnlyPleaseChangeInProduction32chars}
  access-expiration: 3600000
  refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
