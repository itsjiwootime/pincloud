spring:
  datasource:
    url: jdbc:h2:mem:pincloud;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            redirect-uri: http://localhost/api/auth/kakao/callback
            authorization-grant-type: authorization_code
            provider: kakao
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

kakao:
  rest-api-key: test-kakao-rest-api-key
  place-search-url: http://localhost/mock-kakao-place

jwt:
  secret: testSecretKeyForSpringBootTestsShouldBeLongEnough12345
  access-expiration: 3600000
  refresh-expiration: 604800000
