services:
  mysql:
    image: mysql:8.0
    container_name: pincloud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-pincloud}
      MYSQL_DATABASE: pincloud
    ports:
      - "3306:3306"
    volumes:
      - pincloud-mysql-data:/var/lib/mysql

volumes:
  pincloud-mysql-data:
